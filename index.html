<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>igobono - A marketplace where your skills have value</title>
  <meta name="description" content="igobono is a community marketplace where you earn and spend bonos, a social currency, by trading goods, services, and skills. No cash needed.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      color: #2c3e50;
      height: 100vh;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .logo {
      height: 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .video-container {
      width: 100%;
      max-width: 680px;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .video-container video {
      width: 100%;
      display: block;
    }

    .tagline {
      font-size: 1.15rem;
      color: #444;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .form-section {
      text-align: center;
      width: 100%;
      max-width: 520px;
    }

    .form-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .email-form {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .email-form input[type="email"] {
      padding: 11px 14px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 6px;
      flex: 1;
      min-width: 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .email-form input[type="email"]:focus {
      border-color: #27ae60;
    }

    .email-form button {
      padding: 11px 24px;
      font-size: 1rem;
      font-weight: 600;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .email-form button:hover {
      background: #219a52;
    }

    .success-message {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: 10px 16px;
      border-radius: 6px;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 14px;
      padding-bottom: 8px;
    }

    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: opacity 0.2s;
    }

    .social-icon:hover {
      opacity: 0.7;
    }

    .social-icon svg {
      width: 22px;
      height: 22px;
    }

    .copyright {
      font-size: 0.75rem;
      color: #aaa;
      margin-left: 8px;
    }

    @media (max-height: 720px) {
      h1 { font-size: 1.6rem; margin-bottom: 6px; }
      .video-container { max-width: 560px; margin-bottom: 8px; }
      .tagline { font-size: 1rem; margin-bottom: 10px; }
      .logo { height: 40px; }
    }

    @media (max-height: 640px) {
      h1 { font-size: 1.3rem; }
      .video-container { max-width: 460px; }
      .tagline { font-size: 0.9rem; margin-bottom: 8px; }
    }

    @media (max-width: 600px) {
      .page { padding: 10px 16px; }
      h1 { font-size: 1.4rem; }
      .video-container { max-width: 100%; }
      .tagline { font-size: 1rem; }
      .email-form { flex-direction: column; }
      .email-form input[type="email"] { width: 100%; }
      .email-form button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <img src="logo.png" alt="igobono" class="logo">
    </div>

    <div class="main-content">
      <h1>A marketplace where your skills have value.<br>Even without cash.</h1>

      <div class="video-container">
        <video controls preload="metadata">
          <source src="igobono-video.mp4" type="video/mp4">
          Your browser does not support video playback.
        </video>
      </div>

      <p class="tagline">
        Trade goods, services, and skills with people near you.<br>
        Earn and spend "bonos," a social currency. No cash needed.
      </p>

      <div class="form-section">
        <p class="form-label">Join the waitlist. Be first when we launch.</p>
        <form class="email-form" id="signup-form" action="https://formspree.io/f/xrblbdvq" method="POST">
          <input type="email" name="email" placeholder="Enter your email address" required>
          <input type="hidden" name="_subject" value="New igobono waitlist signup">
          <input type="hidden" name="_captcha" value="false">
          <button type="submit">Join the Waitlist</button>
        </form>
        <div class="success-message" id="success-msg">
          You're on the list! We'll notify you when igobono launches.
        </div>
      </div>

      <div class="bottom-row">
        <!-- Facebook logo -->
        <a href="https://facebook.com/igobono" target="_blank" class="social-icon" title="Facebook">
          <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </a>
        <!-- X (Twitter) logo -->
        <a href="https://twitter.com/igobono" target="_blank" class="social-icon" title="X">
          <svg viewBox="0 0 24 24" fill="#000000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <span class="copyright">&copy; 2026 igobono</span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      var data = new FormData(form);
      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(function(response) {
        if (response.ok) {
          form.style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
